name: Validar repositorio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validar catalog.json y SKILLs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar que catalog.json es JSON válido
        run: python -c "import json, sys; json.load(open('catalog.json'))"

      - name: Verificar que todos los paths del catálogo existen
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          catalog = json.load(open("catalog.json"))
          missing = []

          for skill in catalog["skills"]:
              p = Path(skill["path"])
              if not p.exists():
                  missing.append(f"  - {skill['name']}: {skill['path']}")

          if missing:
              print("SKILLs con paths faltantes:")
              print("\n".join(missing))
              sys.exit(1)
          else:
              print(f"OK — {len(catalog['skills'])} SKILLs verificadas.")
          EOF

      - name: Verificar que cada SKILL tiene frontmatter válido
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path

          catalog = json.load(open("catalog.json"))
          errors = []

          for skill in catalog["skills"]:
              path = Path(skill["path"])
              if not path.exists():
                  continue
              content = path.read_text(encoding="utf-8")
              if not content.startswith("---"):
                  errors.append(f"  - {skill['name']}: sin frontmatter YAML")
              if "name:" not in content[:500]:
                  errors.append(f"  - {skill['name']}: frontmatter sin campo 'name'")

          if errors:
              print("Problemas de formato en SKILLs:")
              print("\n".join(errors))
              sys.exit(1)
          else:
              print("OK — frontmatter verificado en todas las SKILLs.")
          EOF
